name: Deploy Production

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build
        run: |
          npm run db:generate
          npm run test:unit
          npm run build

      - name: Validate deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          DEPLOY_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          test -n "$DEPLOY_HOST" || (echo "Missing PRODUCTION_SSH_HOST" && exit 1)
          test -n "$DEPLOY_USER" || (echo "Missing PRODUCTION_SSH_USER" && exit 1)
          test -n "$DEPLOY_KEY" || (echo "Missing PRODUCTION_SSH_KEY" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "Missing PRODUCTION_DEPLOY_PATH" && exit 1)
          test -n "$ENV_FILE" || (echo "Missing PRODUCTION_ENV_FILE" && exit 1)

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          DEPLOY_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/sponsum_deploy_key
          chmod 600 ~/.ssh/sponsum_deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload production environment
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          printf '%s\n' "$ENV_FILE" | ssh -i ~/.ssh/sponsum_deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_PATH' && cat > '$DEPLOY_PATH/.env'"

      - name: Roll out production
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/sponsum_deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' -- "$DEPLOY_PATH" "$GITHUB_SHA" <<'EOF'
          set -euo pipefail
          DEPLOY_PATH="$1"
          TARGET_SHA="$2"

          cd "$DEPLOY_PATH"
          test -d .git || (echo "$DEPLOY_PATH must contain a git checkout of the Sponsum repository" && exit 1)

          git fetch --all --prune
          git reset --hard "$TARGET_SHA"

          docker compose build api web
          docker compose up -d postgres
          docker compose run --rm api npm run db:deploy
          docker compose up -d api web
          docker compose ps
          EOF

      - name: Check production health
        env:
          PRODUCTION_HEALTH_URL: ${{ secrets.PRODUCTION_HEALTH_URL }}
        run: |
          if [ -n "$PRODUCTION_HEALTH_URL" ]; then
            curl --fail --show-error --silent "$PRODUCTION_HEALTH_URL"
          else
            echo "Skipping production health check because PRODUCTION_HEALTH_URL is not set."
          fi
