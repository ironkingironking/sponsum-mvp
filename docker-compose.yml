services:
  postgres:
    image: postgres:16
    container_name: sponsum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sponsum
      POSTGRES_PASSWORD: sponsum
      POSTGRES_DB: sponsum
    ports:
      - "5432:5432"
    volumes:
      - sponsum_pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://sponsum:sponsum@postgres:5432/sponsum?schema=public
      API_PORT: 4000
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  sponsum_pg_data:
